<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practica 3-4 - Flappy Bird Deluxe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🐦 PRACTICA 3-4 - FLAPPY BIRD DELUXE</h1>

    <h3>Programación Web</h3>

</header>

<main>

    <div id="game-container">

        <canvas id="gameCanvas"></canvas>

        <div id="startScreen">
            <h2>FLAPPY BIRD</h2>
            <p>Presiona ESPACIO o haz clic para comenzar</p>
        </div>

        <div id="gameOverScreen" class="hidden">
            <h2>GAME OVER</h2>
            <p id="finalScore"></p>
            <button id="restartBtn">Jugar otra vez</button>
        </div>

    </div>

</main>

<script src="script.js"></script>

</body>
</html>
